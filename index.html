<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TÚN CHÚC MNG ĐỖ NV1 !!!!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #050b14;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            height: 100vh;
            width: 100vw;
            cursor: grab;
            user-select: none;
        }
        body.dragging { cursor: grabbing; }
        #scene {
            position: absolute;
            inset: 0;
            perspective: 900px;
            perspective-origin: 50% 50%;
        }
        #world {
            position: absolute;
            inset: 0;
            transform-style: preserve-3d;
        }
        .wish-text {
            position: absolute;
            color: #ffffff;
            white-space: nowrap;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255,255,255,0.8),
                         0 0 20px rgba(255,255,255,0.5),
                         0 0 30px rgba(0,162,255,0.5);
            pointer-events: none;
            opacity: 0;
            transform-style: preserve-3d;
        }
        #music-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }
        #music-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.5);
            padding: 10px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #music-btn:hover { background: rgba(255,255,255,0.4); box-shadow: 0 0 15px rgba(255,255,255,0.5); }
        .rotating { animation: spin 3s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.45);
            font-size: 13px;
            pointer-events: none;
            z-index: 9999;
            transition: opacity 1.2s;
        }
        .heart {
            position: absolute;
            font-size: 20px;
            pointer-events: none;
            filter: drop-shadow(0 0 5px rgba(255,51,51,0.8));
        }
        .clover {
            position: absolute;
            pointer-events: none;
            opacity: 0;
        }
    </style>
</head>
<body>

<div id="autoplay-overlay" style="position:fixed;inset:0;z-index:99999;cursor:pointer;background:transparent;"></div>

<div id="music-container">
    <button id="music-btn">
        <span id="music-icon">🎵</span>
        <span id="music-status">Bật Nhạc</span>
    </button>
</div>

<div id="hint">🖱️ Kéo để xoay không gian 3D</div>

<div id="scene"><div id="world"></div></div>

<audio id="bg-music" loop>
    <source src="pkl.mp3" type="audio/mpeg">
</audio>

<script>
    const wishes = [
        "Cùng nhau Đỗ NV1 nha",
        "Thành công ở hiện tại và tương lai",
        "Cùng nhau đi tiếp chặng đường tương lai",
        "Đỗ NV1 nha",
        "Chúc My đỗ AOF nhé !!",
        "Chúc Đoan Đỗ UEL",
        "Chúc Phanh Đỗ NEU , FTU",
        "9+ Toán Lý Hóa Anh Văn nào!",
        "Chúc Xuân Hương đỗ FTU",
        "Chúc Hiếu Đỗ SP Toán",
        "Chúc Thiên Bảo Đỗ UEH",
        "Chúc Phúc đỗ HCMUE",
        "Chúc Khanh đỗ AJC",
        "Vạn sự hanh thông",
        "Thuận buồm xuôi gió",
        "Tui Quý Mọi Người Lắm <3"
    ];

    /* ── Nhạc ── */
    const music = document.getElementById('bg-music');
    const musicBtn = document.getElementById('music-btn');
    const musicIcon = document.getElementById('music-icon');
    const musicStatus = document.getElementById('music-status');
    const overlay = document.getElementById('autoplay-overlay');

    function startMusic() {
        music.play().then(() => {
            musicStatus.innerText = "Tắt Nhạc";
            musicIcon.classList.add('rotating');
        }).catch(e => console.log(e));
    }
    function handleFirstInteraction() {
        overlay.remove();
        startMusic();
        document.removeEventListener('click', handleFirstInteraction);
        document.removeEventListener('touchstart', handleFirstInteraction);
    }
    overlay.addEventListener('click', handleFirstInteraction);
    document.addEventListener('touchstart', handleFirstInteraction, { once: true });
    music.play().then(() => { overlay.remove(); musicStatus.innerText = "Tắt Nhạc"; musicIcon.classList.add('rotating'); }).catch(() => {});

    musicBtn.addEventListener('click', e => {
        e.stopPropagation();
        if (music.paused) { startMusic(); }
        else { music.pause(); musicStatus.innerText = "Bật Nhạc"; musicIcon.classList.remove('rotating'); }
    });

    /* ── Xoay 3D ── */
    const world = document.getElementById('world');
    let rotX = -10, rotY = 0;
    let isDragging = false, lastX = 0, lastY = 0;

    function applyRot() {
        world.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
    }
    applyRot();

    document.addEventListener('mousedown', e => {
        if (e.target.closest('#music-container')) return;
        isDragging = true; lastX = e.clientX; lastY = e.clientY;
        document.body.classList.add('dragging');
    });
    document.addEventListener('mousemove', e => {
        if (!isDragging) return;
        rotY += (e.clientX - lastX) * 0.35;
        rotX -= (e.clientY - lastY) * 0.35;
        rotX = Math.max(-65, Math.min(65, rotX));
        lastX = e.clientX; lastY = e.clientY;
        applyRot();
    });
    document.addEventListener('mouseup', () => { isDragging = false; document.body.classList.remove('dragging'); });

    document.addEventListener('touchstart', e => {
        if (e.target.closest('#music-container')) return;
        isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    }, { passive: true });
    document.addEventListener('touchmove', e => {
        if (!isDragging) return;
        rotY += (e.touches[0].clientX - lastX) * 0.35;
        rotX -= (e.touches[0].clientY - lastY) * 0.35;
        rotX = Math.max(-65, Math.min(65, rotX));
        lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
        applyRot();
    }, { passive: true });
    document.addEventListener('touchend', () => { isDragging = false; });

    setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 4500);

    /* ── Keyframe helper ── */
    const styleEl = document.createElement('style');
    document.head.appendChild(styleEl);
    const sheet = styleEl.sheet;
    let kfId = 0;
    function addKf(css) {
        const name = 'kf' + (kfId++);
        try { sheet.insertRule(`@keyframes ${name} { ${css} }`, sheet.cssRules.length); } catch(e) {}
        return name;
    }

    /* ── Chữ bay ── */
    function createWish3D() {
        const el = document.createElement('div');
        el.classList.add('wish-text');
        el.innerText = wishes[Math.floor(Math.random() * wishes.length)];
        const left = Math.random() * 80 + 10;
        const dur = Math.random() * 8 + 7;
        const rX = Math.random() * 40 - 20, rY = Math.random() * 60 - 30, rZ = Math.random() * 20 - 10;
        const dZ = Math.random() * 300 - 150;
        el.style.cssText = `left:${left}%;font-size:${Math.random()*10+14}px;`;
        if (dZ < -50) el.style.filter = 'blur(1.5px)';
        const n = addKf(`
            0%   {transform:translateY(105vh) translateZ(${dZ}px) rotateX(${rX}deg) rotateY(${rY}deg) rotateZ(${rZ}deg);opacity:0}
            15%  {opacity:.85}
            85%  {opacity:.85}
            100% {transform:translateY(-15vh) translateZ(${dZ}px) rotateX(${rX+10}deg) rotateY(${rY+15}deg) rotateZ(${rZ}deg);opacity:0}
        `);
        el.style.animation = `${n} ${dur}s linear forwards`;
        world.appendChild(el);
        setTimeout(() => el.remove(), dur * 1000);
    }

    /* ── Tim ── */
    function createHeart() {
        const el = document.createElement('div');
        el.classList.add('heart');
        el.textContent = '❤️';
        const left = Math.random() * 100, dur = Math.random() * 5 + 4;
        const dZ = Math.random() * 200 - 100, dX = Math.random() * 40 - 20;
        el.style.left = left + '%';
        const n = addKf(`
            0%   {transform:translateY(105vh) translateZ(${dZ}px) scale(.6);opacity:0}
            10%  {opacity:.85}
            90%  {opacity:.85}
            100% {transform:translateY(-10vh) translateZ(${dZ}px) scale(1.2) translateX(${dX}px);opacity:0}
        `);
        el.style.animation = `${n} ${dur}s linear forwards`;
        world.appendChild(el);
        setTimeout(() => el.remove(), dur * 1000);
    }

    /* ── Cỏ 4 lá ── */
    function makeSVG(color, s) {
        const r = s / 4, c = s / 2;
        return `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}" viewBox="0 0 ${s} ${s}">
            <circle cx="${c}" cy="${c-r}" r="${r}" fill="${color}"/>
            <circle cx="${c+r}" cy="${c}" r="${r}" fill="${color}"/>
            <circle cx="${c}" cy="${c+r}" r="${r}" fill="${color}"/>
            <circle cx="${c-r}" cy="${c}" r="${r}" fill="${color}"/>
            <ellipse cx="${c}" cy="${c+r*1.05}" rx="${r*.22}" ry="${r*.9}" fill="${color}"/>
        </svg>`;
    }
    const cloverColors = ['#2ecc71','#27ae60','#a8e063','#56ab2f','#1abc9c'];

    function createClover() {
        const el = document.createElement('div');
        el.classList.add('clover');
        const s = Math.random() * 26 + 16;
        const color = cloverColors[Math.floor(Math.random() * cloverColors.length)];
        el.innerHTML = makeSVG(color, s);
        const left = Math.random() * 95, dur = Math.random() * 7 + 6;
        const dZ = Math.random() * 260 - 130;
        const spin = (Math.random() > .5 ? 360 : -360) * (Math.random() * 2 + 1 | 0);
        const dX = Math.random() * 60 - 30;
        el.style.left = left + '%';
        if (dZ < -50) el.style.filter = 'blur(1px)';
        const n = addKf(`
            0%   {transform:translateY(105vh) translateZ(${dZ}px) rotate(0deg);opacity:0}
            12%  {opacity:.9}
            88%  {opacity:.9}
            100% {transform:translateY(-12vh) translateZ(${dZ}px) rotate(${spin}deg) translateX(${dX}px);opacity:0}
        `);
        el.style.animation = `${n} ${dur}s ease-in-out forwards`;
        world.appendChild(el);
        setTimeout(() => el.remove(), dur * 1000);
    }

    /* ── Start ── */
    setInterval(createWish3D, 500);
    setInterval(createHeart, 400);
    setInterval(createClover, 350);
    for (let i = 0; i < 10; i++) createWish3D();
    for (let i = 0; i < 8; i++) createClover();
</script>
</body>
</html>
